<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2077.cloud - Monero Donation Terminal</title>
  <style>
    :root {
      --bg-color: #040406;
      --card-bg: rgba(12, 11, 14, 0.9);
      --neon-orange: #ff6600;
      --neon-cyan: #00f0ff;
      --text-main: #e2e8f0;
      --text-muted: #52596a;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-color);
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    .panel {
      background: var(--card-bg);
      border: 1px solid rgba(255, 102, 0, 0.25);
      border-radius: 12px;
      padding: 30px;
      max-width: 420px;
      width: 85%;
      text-align: center;
      box-shadow: 0 0 30px rgba(255, 102, 0, 0.1);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }

    h2, h3 {
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 0;
    }

    h2 { font-size: 1.4rem; margin-bottom: 10px; }
    h3 { font-size: 1.1rem; }

    .orange-text { color: var(--neon-orange); text-shadow: 0 0 10px rgba(255, 102, 0, 0.4); }
    .cyan-text { color: var(--neon-cyan); }

    p {
      color: var(--text-main);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .form-group {
      text-align: left;
      margin-bottom: 15px;
    }

    .form-group label {
      color: var(--neon-orange);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: monospace;
      display: block;
      margin-bottom: 5px;
    }

    .input-field {
      width: 100%;
      padding: 12px;
      background: #0d0d11;
      border: 1px solid #221d30;
      border-radius: 6px;
      color: #fff;
      font-family: monospace;
      box-sizing: border-box;
      transition: border 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--neon-orange);
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 102, 0, 0.04);
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(255, 102, 0, 0.1);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
    }

    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider-toggle {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #111015;
      border: 1px solid #221d30;
      transition: .3s;
      border-radius: 22px;
    }

    .slider-toggle:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: var(--text-muted);
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider-toggle {
      border-color: var(--neon-orange);
      box-shadow: 0 0 10px rgba(255, 102, 0, 0.2);
    }

    input:checked + .slider-toggle:before {
      transform: translateX(22px);
      background-color: var(--neon-orange);
      box-shadow: 0 0 8px var(--neon-orange);
    }

    .range-slider {
      width: 100%;
      margin-top: 10px;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: #111015;
      border: 1px solid #221d30;
      border-radius: 3px;
      outline: none;
      accent-color: var(--neon-orange);
    }

    .range-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--neon-orange);
      cursor: pointer;
      box-shadow: 0 0 8px var(--neon-orange);
      transition: transform 0.1s;
    }

    .range-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .action-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s ease-in-out;
      border: 2px solid var(--neon-orange);
      color: var(--neon-orange);
      margin-top: 10px;
    }

    .action-btn:hover {
      background: var(--neon-orange);
      color: #000;
      box-shadow: 0 0 15px rgba(255, 102, 0, 0.4);
    }

    #qr-container {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px dashed rgba(255, 255, 255, 0.1);
    }

    .address-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      margin: 15px 0;
      background: rgba(15, 15, 22, 0.9);
      border: 1px solid #221d30;
      border-radius: 6px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .address-box {
      padding: 12px 45px 12px 12px;
      font-family: monospace;
      font-size: 0.72rem;
      word-break: break-all;
      color: var(--text-main);
      text-align: left;
      width: 100%;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .address-wrapper:hover {
      border-color: var(--neon-orange);
      box-shadow: 0 0 15px rgba(255, 102, 0, 0.4);
    }
    
    .address-wrapper:hover .address-box {
      color: #fff;
      text-shadow: 0 0 8px rgba(255, 102, 0, 0.9);
    }

    .copy-btn {
      position: absolute;
      right: 8px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, transform 0.1s;
    }

    .copy-btn:hover {
      color: var(--neon-orange);
      transform: scale(1.1);
    }

    @keyframes copyFlash {
      0% { background: rgba(255, 102, 0, 0.4); box-shadow: 0 0 25px var(--neon-orange); }
      100% { background: transparent; box-shadow: none; }
    }

    .address-wrapper.copied-flash {
      animation: copyFlash 0.6s ease-out;
    }

    .qr-holder {
      background: white;
      padding: 10px;
      display: inline-block;
      margin: 10px 0;
      border-radius: 4px;
    }

    .qr-holder img {
      display: block;
    }

    .notice {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 15px;
      font-family: monospace;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="canvas-container"></div>

  <div class="ui-layer">
    <div class="panel" id="gateway-panel">
      
      <svg width="60" height="60" viewBox="0 0 100 100" style="margin-bottom: 15px; filter: drop-shadow(0 0 8px var(--neon-orange));">
        <circle cx="50" cy="50" r="48" fill="none" stroke="var(--neon-orange)" stroke-width="4"/>
        <path d="M22 78V46L50 68L78 46V78H90V22H74L50 46L26 22H10V78H22Z" fill="var(--neon-orange)"/>
      </svg>

      <h2>XMR // <span class="orange-text">DONATION NODE</span></h2>
      <p>Support our operations. Provide your information to generate your secure donation gateway.</p>
      
      <div class="form-group toggle-container">
        <span style="color: var(--text-main); font-size: 0.8rem; font-family: monospace; text-transform: uppercase;">Anonymous Donation</span>
        <label class="switch">
          <input type="checkbox" id="anonymous-toggle" checked onchange="toggleAnonymousMode()">
          <span class="slider-toggle"></span>
        </label>
      </div>

      <div class="form-group" id="email-group" style="display: none;">
        <label for="customer-email">Donor Email (Optional)</label>
        <input type="email" id="customer-email" class="input-field" placeholder="donor@domain.com">
      </div>

      <div class="form-group">
        <label for="donation-amount">Amount (Optional XMR)</label>
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 5px;">
          <input type="number" id="donation-amount" class="input-field" placeholder="e.g. 0.05" step="0.00001" min="0.02077" max="2077" oninput="syncFromInput(this.value)" onblur="clampMinAmount()">
          <span style="color: var(--neon-cyan); font-family: monospace; font-weight: bold; font-size: 0.85rem;">XMR</span>
        </div>
        <input type="range" id="donation-slider" class="range-slider" min="0.02077" max="2.077" step="0.00001" value="0.02077" oninput="syncFromSlider(this.value)">
      </div>

      <button onclick="generateDonationInvoice()" class="action-btn" id="action-btn-text">Initialize Donation</button>

      <div id="qr-container">
        <h3>Official Donation Address</h3>
        
        <div class="address-wrapper" id="address-block">
          <div class="address-box" id="address-text" onclick="copyAddressToClipboard()" title="Click to copy"></div>
          <button class="copy-btn" onclick="copyAddressToClipboard()" id="copy-icon-btn" title="Copy address">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
        </div>

        <div class="qr-holder" id="qrcode-image"></div>
        <p style="color: #ff6600; font-family: monospace; font-size: 0.8rem;">
          Scan QR or click address to open your wallet.
        </p>
      </div>

      <div class="notice">SYSTEM INSTANCE: 2077.CLOUD // DONATION TERMINAL</div>
    </div>
  </div>

  <script>
    let scene, camera, renderer, particles, networkLines, magneticRays;
    const countX = 30, countY = 30; 
    const maxConnections = 120; 
    const numRays = 4;

    let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
    let windowHalfX = window.innerWidth / 2;
    let windowHalfY = window.innerHeight / 2;

    function init3D() {
      const container = document.getElementById('canvas-container');
      if (!container) return;

      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x040406, 0.004);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
      camera.position.z = 220;
      camera.position.y = 110;

      const totalParticles = countX * countY;
      const positions = new Float32Array(totalParticles * 3);
      const colors = new Float32Array(totalParticles * 3);
      const colorOrange = new THREE.Color(0xff6600);
      const colorCyan = new THREE.Color(0x00f0ff);
      const spacing = 24;

      let index = 0;
      for (let x = 0; x < countX; x++) {
        for (let y = 0; y < countY; y++) {
          positions[index * 3] = (x * spacing) - ((countX * spacing) / 2);
          positions[index * 3 + 1] = -40;
          positions[index * 3 + 2] = (y * spacing) - ((countY * spacing) / 2);

          const mixedColor = colorOrange.clone().lerp(colorCyan, (y / countY));
          colors[index * 3] = mixedColor.r;
          colors[index * 3 + 1] = mixedColor.g;
          colors[index * 3 + 2] = mixedColor.b;
          index++;
        }
      }

      const particleGeometry = new THREE.BufferGeometry();
      particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const particleMaterial = new THREE.PointsMaterial({
        size: 4.5,
        vertexColors: true,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending
      });

      particles = new THREE.Points(particleGeometry, particleMaterial);
      scene.add(particles);

      const linePositions = new Float32Array(maxConnections * 2 * 3);
      const lineColors = new Float32Array(maxConnections * 2 * 3);
      const lineGeometry = new THREE.BufferGeometry();
      lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
      lineGeometry.setAttribute('color', new THREE.BufferAttribute(lineColors, 3));

      const lineMaterial = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: 0.3,
        blending: THREE.AdditiveBlending
      });

      networkLines = new THREE.LineSegments(lineGeometry, lineMaterial);
      scene.add(networkLines);

      const rayPositions = new Float32Array(numRays * 2 * 3);
      const rayColors = new Float32Array(numRays * 2 * 3);
      const rayGeometry = new THREE.BufferGeometry();
      rayGeometry.setAttribute('position', new THREE.BufferAttribute(rayPositions, 3));
      rayGeometry.setAttribute('color', new THREE.BufferAttribute(rayColors, 3));

      const rayMaterial = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: 0.85,
        blending: THREE.AdditiveBlending
      });

      magneticRays = new THREE.LineSegments(rayGeometry, rayMaterial);
      scene.add(magneticRays);

      renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      container.appendChild(renderer.domElement);

      document.addEventListener('mousemove', onMouseMove, false);
      document.addEventListener('touchmove', onTouchMove, { passive: true });
      window.addEventListener('resize', onWindowResize, false);
      
      animate();
    }

    function onMouseMove(event) {
      mouseX = event.clientX - windowHalfX;
      mouseY = event.clientY - windowHalfY;
    }

    function onTouchMove(event) {
      if (event.touches.length === 1) {
        mouseX = event.touches[0].clientX - windowHalfX;
        mouseY = event.touches[0].clientY - windowHalfY;
      }
    }

    function onWindowResize() {
      windowHalfX = window.innerWidth / 2;
      windowHalfY = window.innerHeight / 2;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.02;

      targetX += (mouseX - targetX) * 0.05;
      targetY += (mouseY - targetY) * 0.05;

      camera.position.x += (targetX * 0.25 - camera.position.x) * 0.05;
      camera.position.y += ((-targetY * 0.2) + 110 - camera.position.y) * 0.05;
      camera.lookAt(new THREE.Vector3(0, -10, 0));

      const particlePositions = particles.geometry.attributes.position.array;
      const particleColors = particles.geometry.attributes.color.array;
      const totalParticles = countX * countY;
      
      let pIdx = 0;
      for (let x = 0; x < countX; x++) {
        for (let y = 0; y < countY; y++) {
          particlePositions[pIdx * 3 + 1] = (Math.sin((x + time) * 0.25) * 12) + (Math.cos((y + time) * 0.25) * 12) - 30;
          pIdx++;
        }
      }
      particles.geometry.attributes.position.needsUpdate = true;

      const linePosAttr = networkLines.geometry.attributes.position.array;
      const lineColAttr = networkLines.geometry.attributes.color.array;
      let lineIdx = 0;

      for (let i = 0; i < maxConnections; i++) {
        const nodeA = Math.floor(Math.abs(Math.sin(i + time * 0.01) * totalParticles)) % totalParticles;
        const nodeB = (nodeA + 1) % totalParticles;

        linePosAttr[lineIdx] = particlePositions[nodeA * 3];
        linePosAttr[lineIdx + 1] = particlePositions[nodeA * 3 + 1];
        linePosAttr[lineIdx + 2] = particlePositions[nodeA * 3 + 2];
        linePosAttr[lineIdx + 3] = particlePositions[nodeB * 3];
        linePosAttr[lineIdx + 4] = particlePositions[nodeB * 3 + 1];
        linePosAttr[lineIdx + 5] = particlePositions[nodeB * 3 + 2];

        lineColAttr[lineIdx] = particleColors[nodeA * 3];
        lineColAttr[lineIdx + 1] = particleColors[nodeA * 3 + 1];
        lineColAttr[lineIdx + 2] = particleColors[nodeA * 3 + 2];
        lineColAttr[lineIdx + 3] = particleColors[nodeB * 3];
        lineColAttr[lineIdx + 4] = particleColors[nodeB * 3 + 1];
        lineColAttr[lineIdx + 5] = particleColors[nodeB * 3 + 2];

        lineIdx += 6;
      }
      networkLines.geometry.attributes.position.needsUpdate = true;
      networkLines.geometry.attributes.color.needsUpdate = true;

      const rayPosAttr = magneticRays.geometry.attributes.position.array;
      const rayColAttr = magneticRays.geometry.attributes.color.array;
      let rayIdx = 0;

      const sourceX = targetX * 0.3;
      const sourceY = (-targetY * 0.2) + 60;
      const sourceZ = 60;

      for (let r = 0; r < numRays; r++) {
        const targetNode = Math.floor(Math.abs(Math.sin(time * (5 + r)) * totalParticles)) % totalParticles;

        rayPosAttr[rayIdx] = sourceX + (Math.sin(time * 10 + r) * 1.5);
        rayPosAttr[rayIdx + 1] = sourceY;
        rayPosAttr[rayIdx + 2] = sourceZ;

        rayPosAttr[rayIdx + 3] = particlePositions[targetNode * 3];
        rayPosAttr[rayIdx + 4] = particlePositions[targetNode * 3 + 1];
        rayPosAttr[rayIdx + 5] = particlePositions[targetNode * 3 + 2];

        rayColAttr[rayIdx] = 1.0; rayColAttr[rayIdx + 1] = 0.4; rayColAttr[rayIdx + 2] = 0.0; 
        rayColAttr[rayIdx + 3] = 0.0; rayColAttr[rayIdx + 4] = 0.94; rayColAttr[rayIdx + 5] = 1.0; 

        rayIdx += 6;
      }
      
      magneticRays.material.opacity = Math.random() > 0.15 ? 0.85 : 0.3; 
      magneticRays.geometry.attributes.position.needsUpdate = true;
      magneticRays.geometry.attributes.color.needsUpdate = true;

      renderer.render(scene, camera);
    }

    window.addEventListener('DOMContentLoaded', init3D);

    function syncFromInput(val) {
      if (val === "") return;
      let num = parseFloat(val);
      if (isNaN(num)) return;
      
      if (num > 2077) {
        num = 2077;
        document.getElementById('donation-amount').value = 2077;
      }

      const slider = document.getElementById('donation-slider');
      if (num >= 0.02077 && num <= 2.077) {
        slider.value = num;
      } else if (num > 2.077) {
        slider.value = 2.077;
      } else {
        slider.value = 0.02077;
      }
    }

    function clampMinAmount() {
      const input = document.getElementById('donation-amount');
      if (input.value === "") return;
      let num = parseFloat(input.value);
      if (!isNaN(num) && num < 0.02077) {
        input.value = 0.02077;
        document.getElementById('donation-slider').value = 0.02077;
      }
    }

    function syncFromSlider(val) {
      const input = document.getElementById('donation-amount');
      input.value = val;
    }

    function toggleAnonymousMode() {
      const isAnon = document.getElementById('anonymous-toggle').checked;
      const emailGroup = document.getElementById('email-group');
      const emailInput = document.getElementById('customer-email');
      
      if (isAnon) {
        emailGroup.style.display = 'none';
        emailInput.value = '';
      } else {
        emailGroup.style.display = 'block';
      }
    }

    function copyAddressToClipboard() {
      const textToCopy = document.getElementById('address-text').innerText;
      const blockElement = document.getElementById('address-block');
      const iconBtn = document.getElementById('copy-icon-btn');

      if (!textToCopy) return;

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(textToCopy)
          .then(() => triggerSuccessFeedback(blockElement, iconBtn))
          .catch(() => fallbackCopyExecution(textToCopy, blockElement, iconBtn));
      } else {
        fallbackCopyExecution(textToCopy, blockElement, iconBtn);
      }
    }

    function fallbackCopyExecution(text, block, button) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.position = "fixed";
      textArea.style.top = "0";
      textArea.style.left = "0";
      textArea.style.width = "2px";
      textArea.style.height = "2px";
      textArea.style.padding = "0";
      textArea.style.border = "none";
      textArea.style.outline = "none";
      textArea.style.boxShadow = "none";
      textArea.style.background = "transparent";
      
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      
      try {
        const successful = document.execCommand('copy');
        if (successful) {
          triggerSuccessFeedback(block, button);
        } else {
          alert("Browser permissions error: please copy manually.");
        }
      } catch (err) {
        alert("Action blocked by browser. Copy the text directly.");
      }
      document.body.removeChild(textArea);
    }

    function triggerSuccessFeedback(block, button) {
      block.classList.remove('copied-flash');
      void block.offsetWidth; 
      block.classList.add('copied-flash');

      button.style.color = "var(--neon-cyan)";
      setTimeout(() => {
        button.style.color = "";
      }, 600);
    }

    function generateDonationInvoice() {
      const isAnon = document.getElementById('anonymous-toggle').checked;
      const email = document.getElementById('customer-email').value;
      
      clampMinAmount();
      const value = document.getElementById('donation-amount').value || 0;
      
      if(!isAnon && (!email || !email.includes('@'))) {
        return alert("Please introduce a valid email address or switch to Anonymous Mode.");
      }

      const myCakeWalletAddress = "888a1qQPtMFZ5AhTR7Zgb1KU3R1Co5D4bKfwc7wKEYuM6H1arC7VECyR5UVAs6g2iuZjpgP9h6LvN2SYRXmNqmsz256Z3je";
      const btn = document.getElementById('action-btn-text');
      
      btn.innerText = "Generating Secure URI...";
      btn.disabled = true;

      try {
        let moneroUri = `monero:${myCakeWalletAddress}`;
        if (value > 0) {
          moneroUri += `?amount=${value}`;
        }
        
        document.getElementById('address-text').innerText = myCakeWalletAddress;
        
        const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(moneroUri)}`;
        
        document.getElementById('qrcode-image').innerHTML = `<a href="${moneroUri}"><img src="${qrApiUrl}" alt="Scan to donate" /></a>`;
        
        document.getElementById('qr-container').style.display = 'block';
        btn.innerText = "Donation Active";
        
      } catch (error) {
        alert("Failure generating node terminal structures.");
        btn.innerText = "Initialize Donation";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
