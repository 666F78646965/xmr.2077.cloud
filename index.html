<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>xmr.2077.cloud</title>
  <style>
    :root {
      --bg-color: #040406;
      --card-bg: rgba(12, 11, 14, 0.9);
      --neon-orange: #ff6600;
      --neon-cyan: #00f0ff;
      --neon-green: #00ff00;
      --neon-red: #ff0055;
      --text-main: #e2e8f0;
      --text-muted: #52596a;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: var(--bg-color);
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #game-hud {
      display: none;
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      max-width: 400px;
      z-index: 10;
      text-align: center;
    }
    
    #gauge-border {
      width: 100%;
      height: 15px;
      border: 2px solid #fff;
      border-radius: 8px;
      overflow: hidden;
      background: rgba(0,0,0,0.5);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    #gauge-fill {
      width: 0%;
      height: 100%;
      background: var(--neon-red);
      transition: width 0.1s linear, background-color 0.3s;
    }

    #score-text {
      color: #fff;
      font-family: monospace;
      font-weight: bold;
      font-size: 1.2rem;
      margin-top: 5px;
      text-shadow: 0 0 5px #fff;
    }

    .matrix-rain {
      position: absolute;
      color: var(--neon-green);
      font-family: monospace;
      font-weight: bold;
      font-size: 1.1rem;
      pointer-events: none;
      text-shadow: 0 0 8px var(--neon-green);
      z-index: 5;
      opacity: 0;
      animation: fall linear forwards;
    }

    @keyframes fall {
      0% { opacity: 0; transform: translateY(-20px); }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translateY(150px); }
    }

    .ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      pointer-events: none;
    }

    .panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card-bg);
      border: 1px solid rgba(255, 102, 0, 0.25);
      border-radius: 12px;
      padding: 30px;
      max-width: 420px;
      width: 85%;
      text-align: center;
      box-shadow: 0 0 30px rgba(255, 102, 0, 0.1);
      backdrop-filter: blur(10px);
      pointer-events: auto;
      transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      max-height: 90vh;
      overflow-y: auto;
    }

    .panel.minimized {
      top: auto;
      bottom: 30px;
      left: 30px;
      transform: none;
      width: 50px;
      height: 50px;
      min-width: unset;
      padding: 0;
      border-radius: 25px;
      overflow: hidden;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .panel-content {
      transition: opacity 0.3s;
    }

    .panel.minimized .panel-content {
      opacity: 0;
      pointer-events: none;
      display: none;
    }

    .panel-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
      border-radius: 50%;
      transition: all 0.3s ease;
      z-index: 30;
    }

    .panel.minimized .panel-toggle {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      right: auto;
    }

    .panel-toggle:hover { color: #fff; }

    .glow-red { color: var(--neon-red) !important; filter: drop-shadow(0 0 10px var(--neon-red)); }
    .glow-cyan { color: var(--neon-cyan) !important; filter: drop-shadow(0 0 10px var(--neon-cyan)); }
    .glow-green { color: var(--neon-green) !important; filter: drop-shadow(0 0 12px var(--neon-green)); }

    body.matrix-mode .panel { border-color: rgba(0, 255, 0, 0.3); box-shadow: 0 0 30px rgba(0, 255, 0, 0.1); }
    body.matrix-mode h2 .orange-text, body.matrix-mode label { color: var(--neon-green) !important; text-shadow: 0 0 10px rgba(0, 255, 0, 0.4); }
    body.matrix-mode svg circle { stroke: var(--neon-green); }
    body.matrix-mode svg path { fill: var(--neon-green); }
    body.matrix-mode .action-btn { border-color: var(--neon-green); color: var(--neon-green); }
    body.matrix-mode .action-btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px rgba(0, 255, 0, 0.4); }
    body.matrix-mode .range-slider { accent-color: var(--neon-green); }
    body.matrix-mode .range-slider::-webkit-slider-thumb { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }
    body.matrix-mode input:checked + .slider-toggle { border-color: var(--neon-green); }
    body.matrix-mode input:checked + .slider-toggle:before { background-color: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }

    h2, h3 { letter-spacing: 2px; text-transform: uppercase; margin-top: 0; }
    h2 { font-size: 1.4rem; margin-bottom: 10px; padding-right: 25px; }
    h3 { font-size: 1.1rem; }
    .orange-text { color: var(--neon-orange); text-shadow: 0 0 10px rgba(255, 102, 0, 0.4); }

    p { color: var(--text-main); font-size: 0.9rem; line-height: 1.4; }
    .form-group { text-align: left; margin-bottom: 15px; }
    .form-group label { color: var(--neon-orange); font-size: 0.75rem; text-transform: uppercase; font-family: monospace; display: block; margin-bottom: 5px; }
    .input-field { width: 100%; padding: 12px; background: #0d0d11; border: 1px solid #221d30; border-radius: 6px; color: #fff; font-family: monospace; box-sizing: border-box; }
    .input-field:focus { outline: none; border-color: var(--neon-orange); }

    .toggle-container { display: flex; align-items: center; justify-content: space-between; background: rgba(255, 102, 0, 0.04); padding: 10px; border-radius: 6px; border: 1px solid rgba(255, 102, 0, 0.1); }
    .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider-toggle { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #111015; border: 1px solid #221d30; transition: .3s; border-radius: 22px; }
    .slider-toggle:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: var(--text-muted); transition: .3s; border-radius: 50%; }
    input:checked + .slider-toggle { border-color: var(--neon-orange); }
    input:checked + .slider-toggle:before { transform: translateX(22px); background-color: var(--neon-orange); box-shadow: 0 0 8px var(--neon-orange); }

    .range-slider { width: 100%; margin-top: 10px; height: 6px; -webkit-appearance: none; appearance: none; background: #111015; border: 1px solid #221d30; border-radius: 3px; outline: none; accent-color: var(--neon-orange); }
    .range-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--neon-orange); cursor: pointer; box-shadow: 0 0 8px var(--neon-orange); }

    .action-btn { width: 100%; padding: 14px; background: transparent; font-weight: bold; text-transform: uppercase; border-radius: 4px; cursor: pointer; border: 2px solid var(--neon-orange); color: var(--neon-orange); margin-top: 10px; transition: 0.3s; }
    .action-btn:hover { background: var(--neon-orange); color: #000; box-shadow: 0 0 15px rgba(255, 102, 0, 0.4); }

    #qr-container { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px dashed rgba(255, 255, 255, 0.1); }
    .address-wrapper { position: relative; margin: 15px 0; background: rgba(15, 15, 22, 0.9); border: 1px solid #221d30; border-radius: 6px; padding: 12px; word-break: break-all; font-family: monospace; font-size: 0.72rem; }
    .notice { font-size: 0.7rem; color: var(--text-muted); margin-top: 15px; font-family: monospace; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="canvas-container"></div>

  <div id="game-hud">
    <div id="gauge-border"><div id="gauge-fill"></div></div>
    <div id="score-text">0 / 100</div>
  </div>

  <div class="ui-layer">
    <div class="panel" id="gateway-panel">
      
      <button class="panel-toggle" id="panel-toggle-btn" onclick="togglePanel()" title="Minimize Terminal">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      
      <div class="panel-content" id="panel-inner">
        <svg id="logo-svg" width="60" height="60" viewBox="0 0 100 100" style="margin-bottom: 15px; filter: drop-shadow(0 0 8px var(--neon-orange));">
          <circle cx="50" cy="50" r="48" fill="none" stroke="var(--neon-orange)" stroke-width="4"/>
          <path d="M22 78V46L50 68L78 46V78H90V22H74L50 46L26 22H10V78H22Z" fill="var(--neon-orange)"/>
        </svg>

        <h2><span style="color: var(--text-muted);">XMR //</span> <span class="orange-text">DONATION NODE</span></h2>
        <p>Support our operations. Provide your information to generate your secure donation gateway.</p>
        
        <div class="form-group toggle-container">
          <span style="color: var(--text-main); font-size: 0.8rem; font-family: monospace;">ANONYMOUS DONATION</span>
          <label class="switch">
            <input type="checkbox" checked>
            <span class="slider-toggle"></span>
          </label>
        </div>

        <div class="form-group">
          <label>Amount (MONERO)</label>
          <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 5px;">
            <input type="number" id="donation-amount" class="input-field" value="0.05" oninput="checkSecretAmount(this.value)">
            <span style="color: var(--neon-cyan); font-family: monospace; font-weight: bold; font-size: 0.85rem;">XMR</span>
          </div>
          <input type="range" class="range-slider" min="0" max="2000" step="1" value="0" oninput="document.getElementById('donation-amount').value=this.value; checkSecretAmount(this.value)">
        </div>

        <button class="action-btn">Initialize Donation</button>
        <div class="notice">SYSTEM INSTANCE: 2077.CLOUD // TERMINAL</div>
      </div>
    </div>
  </div>

  <script>
    let scene, camera, renderer, particles, networkLines, magneticRays;
    const countX = 40, countY = 80, maxConnections = 150, numRays = 4;
    const spacingX = 12, spacingZ = 12;

    let isMinimized = false;
    let secretMode = 0; 
    let gameActive = false;
    let matrixModeActive = false;

    let mouseX = 0, mouseY = 0;
    let windowHalfX = window.innerWidth / 2;
    let windowHalfY = window.innerHeight / 2;

    let boatMesh;
    let items = []; 
    
    let tunnelMorph = 0; 
    let score = 0;
    let baseSpeed = 2;
    let currentSpeed = baseSpeed;
    
    let boostActive = false;
    let boostTimer = 0;
    let targetBoostSpeed = 1;

    const itemColors = [
      0xff0055, 0xff6600, 0xffff00, 0x00ff00, 0x00f0ff, 
      0x0000ff, 0x8a2be2, 0xff00ff, 0xffffff, 0xffd700
    ];

    const tunnelRadius = 50;
    let curveX = [];
    let curveY = [];

    function generateTunnelPath() {
      curveX = new Float32Array(countY);
      curveY = new Float32Array(countY);
      let cx = 0, cy = 0;
      let tx = 0, ty = 0;
      let steps = 0;

      for (let i = 0; i < countY; i++) {
        if (steps <= 0) {
          tx = (Math.random() - 0.5) * 45;
          ty = (Math.random() - 0.5) * 45;
          steps = Math.floor(Math.random() * 20) + 10;
        }
        cx += (tx - cx) * 0.15;
        cy += (ty - cy) * 0.15;
        curveX[i] = cx;
        curveY[i] = cy;
        steps--;
      }
    }

    function shiftTunnelPath(speed) {
      let shift = Math.floor(speed) || 1;
      let cx = curveX[countY - 1];
      let cy = curveY[countY - 1];
      
      for (let i = 0; i < countY - shift; i++) {
        curveX[i] = curveX[i + shift];
        curveY[i] = curveY[i + shift];
      }

      staticSteps = (window.staticSteps === undefined) ? 0 : window.staticSteps;
      staticTx = window.staticTx || 0;
      staticTy = window.staticTy || 0;

      for (let i = countY - shift; i < countY; i++) {
        if (staticSteps <= 0) {
          staticTx = (Math.random() - 0.5) * 65;
          staticTy = (Math.random() - 0.5) * 65;
          staticSteps = Math.floor(Math.random() * 25) + 15;
        }
        cx += (staticTx - cx) * 0.1;
        cy += (staticTy - cy) * 0.1;
        curveX[i] = cx;
        curveY[i] = cy;
        staticSteps--;
      }
      window.staticSteps = staticSteps;
      window.staticTx = staticTx;
      window.staticTy = staticTy;
    }

    function init3D() {
      const container = document.getElementById('canvas-container');
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x040406, 0.0025);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1200);
      
      generateTunnelPath();

      const totalParticles = countX * countY;
      const positions = new Float32Array(totalParticles * 3);
      const colors = new Float32Array(totalParticles * 3);

      let index = 0;
      for (let x = 0; x < countX; x++) {
        for (let y = 0; y < countY; y++) {
          positions[index * 3] = (x * spacingX) - ((countX * spacingX) / 2);
          positions[index * 3 + 1] = -40;
          positions[index * 3 + 2] = -y * spacingZ;
          
          colors[index * 3] = 1.0;     
          colors[index * 3 + 1] = 0.4; 
          colors[index * 3 + 2] = 0.0; 
          index++;
        }
      }

      const particleGeo = new THREE.BufferGeometry();
      particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const particleMat = new THREE.PointsMaterial({ size: 3.5, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
      particles = new THREE.Points(particleGeo, particleMat);
      scene.add(particles);

      const linePos = new Float32Array(maxConnections * 2 * 3);
      const lineCol = new Float32Array(maxConnections * 2 * 3);
      const lineGeo = new THREE.BufferGeometry();
      lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
      lineGeo.setAttribute('color', new THREE.BufferAttribute(lineCol, 3));
      networkLines = new THREE.LineSegments(lineGeo, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending }));
      scene.add(networkLines);

      const rayPos = new Float32Array(numRays * 2 * 3);
      const rayCol = new Float32Array(numRays * 2 * 3);
      const rayGeo = new THREE.BufferGeometry();
      rayGeo.setAttribute('position', new THREE.BufferAttribute(rayPos, 3));
      rayGeo.setAttribute('color', new THREE.BufferAttribute(rayCol, 3));
      magneticRays = new THREE.LineSegments(rayGeo, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending }));
      scene.add(magneticRays);

      const boatGroup = new THREE.Group();
      const bodyGeo = new THREE.ConeGeometry(3, 10, 4);
      bodyGeo.rotateX(Math.PI / 2); 
      const bodyMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff, wireframe: true });
      const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
      boatGroup.add(bodyMesh);
      boatGroup.visible = false;
      scene.add(boatGroup);
      boatMesh = boatGroup;

      renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      container.appendChild(renderer.domElement);

      document.addEventListener('mousemove', e => {
        mouseX = e.clientX - windowHalfX;
        mouseY = e.clientY - windowHalfY;
      });
      document.addEventListener('touchmove', e => {
        if(e.touches.length > 0) {
          mouseX = e.touches[0].clientX - windowHalfX;
          mouseY = e.touches[0].clientY - windowHalfY;
        }
      }, {passive:true});
      window.addEventListener('resize', onWindowResize, false);

      animate();
    }

    function onWindowResize() {
      windowHalfX = window.innerWidth / 2;
      windowHalfY = window.innerHeight / 2;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function checkSecretAmount(val) {
      const btn = document.getElementById('panel-toggle-btn');
      btn.className = 'panel-toggle'; 
      
      let num = parseFloat(val);
      if (num === 666) {
        secretMode = 1;
        btn.classList.add('glow-red');
      } else if (num === 1337) {
        secretMode = 2;
        btn.classList.add('glow-cyan');
      } else {
        secretMode = 0;
        if (matrixModeActive) btn.classList.add('glow-green');
      }
    }

    function togglePanel() {
      const panel = document.getElementById('gateway-panel');
      const btn = document.getElementById('panel-toggle-btn');
      isMinimized = !isMinimized;

      if (isMinimized) {
        panel.classList.add('minimized');
        document.getElementById('panel-inner').style.display = 'none';
        btn.innerHTML = `<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>`;
        
        if (secretMode === 2 && !matrixModeActive) startGame1337();
      } else {
        panel.classList.remove('minimized');
        setTimeout(() => document.getElementById('panel-inner').style.display = 'block', 200);
        btn.innerHTML = `<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
        
        stopGame();
      }
    }

    function startGame1337() {
      gameActive = true;
      score = 0;
      currentSpeed = baseSpeed;
      boostActive = false;
      boostTimer = 0;
      targetBoostSpeed = 1;
      updateGauge();
      boatMesh.visible = true;
      document.getElementById('game-hud').style.display = 'block';
    }

    function stopGame() {
      gameActive = false;
      tunnelMorph = 0;
      boatMesh.visible = false;
      items.forEach(i => scene.remove(i));
      items = [];
      document.getElementById('game-hud').style.display = 'none';
    }

    function triggerMatrixMode() {
      stopGame();
      matrixModeActive = true;
      document.body.classList.add('matrix-mode');
      const btn = document.getElementById('panel-toggle-btn');
      btn.className = 'panel-toggle glow-green';
      
      const particleColors = particles.geometry.attributes.color.array;
      for(let i=0; i<particleColors.length; i+=3) {
        particleColors[i] = 0.0;
        particleColors[i+1] = 1.0;
        particleColors[i+2] = 0.0;
      }
      particles.geometry.attributes.color.needsUpdate = true;
      
      setInterval(spawnMatrixRain, 150);
    }

    function spawnMatrixRain() {
      if(!matrixModeActive) return;
      const el = document.createElement('div');
      el.className = 'matrix-rain';
      el.innerText = Math.random() > 0.5 ? '1' : '0';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = (Math.random() * 40 + 20) + 'vh';
      el.style.animationDuration = (Math.random() * 2 + 1) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function updateGauge() {
      const fill = document.getElementById('gauge-fill');
      const text = document.getElementById('score-text');
      let percentage = (score / 100) * 100;
      fill.style.width = percentage + '%';
      text.innerText = score + ' / 100';
      
      let level = Math.floor(score / 10);
      if (level > 9) level = 9;
      const hexColor = itemColors[level];
      fill.style.backgroundColor = '#' + hexColor.toString(16).padStart(6, '0');
    }

    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.02;

      if (gameActive && secretMode === 2) {
        tunnelMorph += (1 - tunnelMorph) * 0.04;
        
        if (boostActive) {
          boostTimer -= 0.016; 
          if (boostTimer > 3) {
            targetBoostSpeed += (baseSpeed * 3 - targetBoostSpeed) * 0.1;
          } else if (boostTimer <= 3 && boostTimer > 0) {
            targetBoostSpeed += (baseSpeed - targetBoostSpeed) * 0.02;
          } else {
            boostActive = false;
            targetBoostSpeed = baseSpeed;
          }
          currentSpeed = targetBoostSpeed;
        } else {
          let expectedSpeed = baseSpeed + Math.floor(score / 10) * 0.4;
          currentSpeed += (expectedSpeed - currentSpeed) * 0.1;
        }

        shiftTunnelPath(currentSpeed * 0.3);
      } else {
        tunnelMorph += (0 - tunnelMorph) * 0.05;
        currentSpeed = baseSpeed;
      }

      const pPos = particles.geometry.attributes.position.array;
      const pCol = particles.geometry.attributes.color.array;
      const totalParticles = countX * countY;
      
      let pIdx = 0;

      for (let x = 0; x < countX; x++) {
        for (let y = 0; y < countY; y++) {
          
          let flatX = (x * spacingX) - ((countX * spacingX) / 2);
          let flatY = (Math.sin((x + time)*0.25)*10) + (Math.cos((y + time)*0.25)*10) - 30;
          let flatZ = -y * spacingZ;
          
          let angle = (x / countX) * Math.PI * 2;
          let offsetX = curveX[y];
          let offsetY = curveY[y];
          
          let tunX = offsetX + Math.cos(angle) * tunnelRadius;
          let tunY = offsetY + Math.sin(angle) * tunnelRadius;
          let tunZ = -y * spacingZ;
          
          pPos[pIdx*3] = flatX + (tunX - flatX) * tunnelMorph;
          pPos[pIdx*3+1] = flatY + (tunY - flatY) * tunnelMorph;
          pPos[pIdx*3+2] = flatZ + (tunZ - flatZ) * tunnelMorph;

          if (!matrixModeActive) {
            let mix = y / countY;
            pCol[pIdx*3] = 1.0 - mix; 
            pCol[pIdx*3+1] = 0.4 + mix*0.6; 
            pCol[pIdx*3+2] = mix; 
          }
          pIdx++;
        }
      }
      particles.geometry.attributes.position.needsUpdate = true;
      if(!matrixModeActive) particles.geometry.attributes.color.needsUpdate = true;

      const lPos = networkLines.geometry.attributes.position.array;
      const lCol = networkLines.geometry.attributes.color.array;
      let lIdx = 0;
      for (let i = 0; i < maxConnections; i++) {
        const nodeA = Math.floor(Math.abs(Math.sin(i + time*0.01) * totalParticles)) % totalParticles;
        const nodeB = (nodeA + 1) % totalParticles;

        for(let c=0; c<3; c++) {
          lPos[lIdx+c] = pPos[nodeA*3+c];
          lPos[lIdx+3+c] = pPos[nodeB*3+c];
          lCol[lIdx+c] = pCol[nodeA*3+c];
          lCol[lIdx+3+c] = pCol[nodeB*3+c];
        }
        lIdx += 6;
      }
      networkLines.geometry.attributes.position.needsUpdate = true;
      networkLines.geometry.attributes.color.needsUpdate = true;

      if (gameActive && secretMode === 2) {
        
        let targetAngle = (mouseX / windowHalfX) * Math.PI; 
        let currentAngle = Math.atan2(boatMesh.position.y - curveY[5], boatMesh.position.x - curveX[5]);
        
        let diff = targetAngle - currentAngle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        
        let newAngle = currentAngle + diff * 0.15;
        
        let nodeX = curveX[5];
        let nodeY = curveY[5];
        
        boatMesh.position.x = nodeX + Math.cos(newAngle) * (tunnelRadius - 3);
        boatMesh.position.y = nodeY + Math.sin(newAngle) * (tunnelRadius - 3);
        boatMesh.position.z = -5 * spacingZ; 
        
        boatMesh.lookAt(curveX[6], curveY[6], -6 * spacingZ);
        boatMesh.rotateZ(newAngle + Math.PI/2); 

        camera.position.x += (nodeX - camera.position.x) * 0.2;
        camera.position.y += (nodeY - camera.position.y) * 0.2;
        camera.position.z = boatMesh.position.z + 45;
        camera.lookAt(curveX[15], curveY[15], -15 * spacingZ);

        if (Math.random() < 0.06 && items.length < 20) {
          let isBoost = Math.random() < 0.12; 
          let geo = isBoost ? new THREE.TorusGeometry(3, 1, 6, 12) : new THREE.OctahedronGeometry(3);
          
          let level = Math.floor(score / 10);
          if(level > 9) level = 9;
          
          let mat = new THREE.MeshBasicMaterial({ 
            color: isBoost ? 0x00ff00 : itemColors[level], 
            wireframe: true 
          });
          
          const item = new THREE.Mesh(geo, mat);
          let spawnAngle = Math.random() * Math.PI * 2;
          let spawnYIdx = countY - 5; 
          
          item.position.x = curveX[spawnYIdx] + Math.cos(spawnAngle) * (tunnelRadius - 3);
          item.position.y = curveY[spawnYIdx] + Math.sin(spawnAngle) * (tunnelRadius - 3);
          item.position.z = -spawnYIdx * spacingZ;
          item.userData = { isBoost: isBoost, yIdx: spawnYIdx, angle: spawnAngle };
          
          scene.add(item);
          items.push(item);
        }

        for (let i = items.length - 1; i >= 0; i--) {
          const item = items[i];
          
          item.userData.yIdx -= currentSpeed * 0.3;
          let currentYIdx = Math.floor(item.userData.yIdx);
          
          if (currentYIdx < 0 || currentYIdx >= countY) {
            scene.remove(item);
            items.splice(i, 1);
            continue;
          }
          
          item.position.x = curveX[currentYIdx] + Math.cos(item.userData.angle) * (tunnelRadius - 3);
          item.position.y = curveY[currentYIdx] + Math.sin(item.userData.angle) * (tunnelRadius - 3);
          item.position.z = -currentYIdx * spacingZ;
          
          item.rotation.x += 0.04;
          item.rotation.y += 0.04;

          if (item.position.z > boatMesh.position.z - 8 && item.position.z < boatMesh.position.z + 8) {
            if (item.position.distanceTo(boatMesh.position) < 12) {
              scene.remove(item);
              items.splice(i, 1);
              
              if (item.userData.isBoost) {
                boostActive = true;
                boostTimer = 6; 
                targetBoostSpeed = currentSpeed;
              } else {
                score++;
                if (score % 10 === 0 && !boostActive) {
                  let level = Math.floor(score / 10);
                  boatMesh.children[0].material.color.setHex(itemColors[Math.min(level, 9)]);
                }
                updateGauge();
                if (score >= 100) {
                  triggerMatrixMode();
                }
              }
              continue;
            }
          }

          if (item.position.z > camera.position.z) {
            scene.remove(item);
            items.splice(i, 1);
          }
        }

      } else {
        camera.position.x += (mouseX * 0.1 - camera.position.x) * 0.05;
        camera.position.y += ((-mouseY * 0.1) + 110 - camera.position.y) * 0.05;
        camera.position.z += (220 - camera.position.z) * 0.05;
        camera.lookAt(0, -10, -100);
      }

      // Rayons Matrix Effect
      const rayPosAttr = magneticRays.geometry.attributes.position.array;
      const rayColAttr = magneticRays.geometry.attributes.color.array;
      let rayIdx = 0;
      for (let r = 0; r < numRays; r++) {
        let nodeA = Math.floor(Math.abs(Math.sin(time * (2 + r)) * totalParticles)) % totalParticles;
        let nodeB = (nodeA + countX) % totalParticles;
        
        rayPosAttr[rayIdx] = pPos[nodeA * 3];
        rayPosAttr[rayIdx + 1] = pPos[nodeA * 3 + 1];
        rayPosAttr[rayIdx + 2] = pPos[nodeA * 3 + 2];
        rayPosAttr[rayIdx + 3] = pPos[nodeB * 3];
        rayPosAttr[rayIdx + 4] = pPos[nodeB * 3 + 1];
        rayPosAttr[rayIdx + 2 + 3] = pPos[nodeB * 3 + 2];

        if (matrixModeActive) {
          rayColAttr[rayIdx] = 0.0; rayColAttr[rayIdx + 1] = 1.0; rayColAttr[rayIdx + 2] = 0.0;
          rayColAttr[rayIdx + 3] = 0.0; rayColAttr[rayIdx + 4] = 0.4; rayColAttr[rayIdx + 5] = 0.0;
        } else {
          rayColAttr[rayIdx] = 1.0; rayColAttr[rayIdx + 1] = 0.4; rayColAttr[rayIdx + 2] = 0.0;
          rayColAttr[rayIdx + 3] = 0.0; rayColAttr[rayIdx + 4] = 0.94; rayColAttr[rayIdx + 5] = 1.0;
        }
        rayIdx += 6;
      }
      magneticRays.geometry.attributes.position.needsUpdate = true;
      magneticRays.geometry.attributes.color.needsUpdate = true;

      renderer.render(scene, camera);
    }

    init3D();
  </script>
</body>
